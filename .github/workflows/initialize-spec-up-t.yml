name: Initialize Spec-Up-T Project

on:
  workflow_dispatch:

env:
  PROJECT_NAME: "2026-03-28-temp-test2"
  PROJECT_DESCRIPTION: "---"
  SPEC_TITLE: "2026-03-28-temp-test2"
  AUTHORS: ""
  LOGO: "https://raw.githubusercontent.com/trustoverip/spec-up-t/refs/heads/master/src/install-from-boilerplate/boilerplate/static/logo.svg"
  LOGO_LINK: "https://github.com/trustoverip/spec-up-t"
  FAVICON: "https://raw.githubusercontent.com/trustoverip/spec-up-t/refs/heads/master/src/install-from-boilerplate/boilerplate/static/favicon.ico"
  ACCOUNT: "kordwarshuis"
  REPO: "2026-03-28-temp-test2"
  SPEC_UP_T_TEMPLATE: "default"

jobs:
  initialize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install create-spec-up-t
        run: npm install -g create-spec-up-t

      - name: Create project structure
        run: |
          SPEC_UP_T_TEMPLATE=$SPEC_UP_T_TEMPLATE npx create-spec-up-t temp-project
          # Copy everything except .github/workflows to avoid permission issues
          find temp-project -maxdepth 1 -not -name temp-project -not -name .git -not -name .github -exec cp -r {} . \;
          # Copy .github directory but exclude workflows
          mkdir -p .github
          find temp-project/.github -maxdepth 1 -not -name .github -not -name workflows -exec cp -r {} .github/ \; 2>/dev/null || true
          rm -rf temp-project

      - name: Customize configuration
        run: |
          if [ -f "specs.json" ]; then
            node -e "
              const fs = require('fs');
              const config = JSON.parse(fs.readFileSync('specs.json', 'utf8'));
              if (config.specs && config.specs[0]) {
                config.specs[0].title = process.env.SPEC_TITLE;
                config.specs[0].description = process.env.PROJECT_DESCRIPTION;
                if (process.env.AUTHORS) {
                  config.specs[0].author = process.env.AUTHORS;
                }
                if (process.env.LOGO) {
                  config.specs[0].logo = process.env.LOGO;
                }
                if (process.env.LOGO_LINK) {
                  config.specs[0].logo_link = process.env.LOGO_LINK;
                }
                if (process.env.FAVICON) {
                  config.specs[0].favicon = process.env.FAVICON;
                }
                // Initialize source object if it doesn't exist
                if (!config.specs[0].source) {
                  config.specs[0].source = {};
                }
                if (process.env.ACCOUNT) {
                  config.specs[0].source.account = process.env.ACCOUNT;
                }
                if (process.env.REPO) {
                  config.specs[0].source.repo = process.env.REPO;
                }
              }
              fs.writeFileSync('specs.json', JSON.stringify(config, null, 2));
            "
          fi

      - name: Update package.json
        run: |
          if [ -f "package.json" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.name = process.env.PROJECT_NAME;
              pkg.description = process.env.PROJECT_DESCRIPTION;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            "
          fi

      - name: Update README
        run: |
          if [ -f "README.md" ]; then
            echo "# $PROJECT_NAME" > README.md
            if [ -n "$PROJECT_DESCRIPTION" ]; then
              echo "" >> README.md
              echo "$PROJECT_DESCRIPTION" >> README.md
            fi
            if [ -n "$AUTHORS" ]; then
              echo "" >> README.md
              echo "## Authors" >> README.md
              echo "" >> README.md
              echo "$AUTHORS" >> README.md
            fi
          fi

      - name: Generate initial documentation
        run: npm run render 4

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Show what files we're about to commit for debugging
          echo "Files to be committed:"
          git status --porcelain
          git add .
          git commit -m "Initialize Spec-Up-T project: $PROJECT_NAME" || echo "No changes to commit"
          git push origin main

      - name: Clean up
        run: |
          git rm .github/workflows/initialize-spec-up-t.yml || echo "File not found"
          git commit -m "Remove initialization workflow" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"
